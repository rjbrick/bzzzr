name: buzzzr-scan

on:
  workflow_dispatch:
  schedule:
    - cron: "20 13 * * 1-5"
    - cron: "20 17 * * 1-5"
    - cron: "20 21 * * 1-5"

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install numpy pandas requests yfinance
      - name: Run scan
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SITE_URL: "https://bzzzr.co"
        run: python scan.py
